[build]
  command = "npm run install-all && cd client && npm run build"
  publish = "client/dist"
  functions = "server"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/netlify-handler/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
